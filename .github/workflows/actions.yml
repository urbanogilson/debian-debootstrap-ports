name: actions
on:
  push:
    paths:
      - 'update.sh'
      - '.github/workflows/actions.yml'
  schedule:
    - cron: '0 0 15 * *'
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive
  DOCKER_REPO: docker.io/urbanogilson/debian-debootstrap-ports

jobs:
  debian-debootstrap-ports:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        VERSION: [sid]
        include:
          - {ARCH: alpha,   QEMU_ARCH: alpha,       UNAME_ARCH: alpha,   CONTAINER_ARCH: alpha,   VERSION: sid}
          - {ARCH: hppa,    QEMU_ARCH: hppa,        UNAME_ARCH: hppa,    CONTAINER_ARCH: hppa,    VERSION: sid}
          - {ARCH: loong64, QEMU_ARCH: loongarch64, UNAME_ARCH: loong64, CONTAINER_ARCH: loong64, VERSION: sid}
          - {ARCH: m68k,    QEMU_ARCH: m68k,        UNAME_ARCH: m68k,    CONTAINER_ARCH: m68k,    VERSION: sid}
          - {ARCH: powerpc, QEMU_ARCH: ppc,         UNAME_ARCH: powerpc, CONTAINER_ARCH: ppc,     VERSION: sid}
          - {ARCH: ppc64,   QEMU_ARCH: ppc64,       UNAME_ARCH: ppc64,   CONTAINER_ARCH: ppc64,   VERSION: sid}
          - {ARCH: riscv64, QEMU_ARCH: riscv64,     UNAME_ARCH: riscv64, CONTAINER_ARCH: riscv64, VERSION: sid}
          - {ARCH: sh4,     QEMU_ARCH: sh4,         UNAME_ARCH: sh4,     CONTAINER_ARCH: sh4,     VERSION: sid}
          - {ARCH: sparc64, QEMU_ARCH: sparc64,     UNAME_ARCH: sparc64, CONTAINER_ARCH: sparc64, VERSION: sid}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          sudo rm -f /var/lib/man-db/auto-update
          echo "man-db man-db/auto-update boolean false" | sudo debconf-set-selections
          sudo apt-get purge -y needrestart snapd || true
          sudo apt-get update
          sudo apt-get install -y qemu-user-static debootstrap
          dpkg -L qemu-user-static | grep ${{ matrix.QEMU_ARCH }} || true
          ls -alh /proc/sys/fs/binfmt_misc/ || true
          ./update.sh \
            -a ${{ matrix.ARCH }} \
            -c ${{ matrix.CONTAINER_ARCH }} \
            -v ${{ matrix.VERSION }} \
            -q ${{ matrix.QEMU_ARCH }} \
            -d ${{ env.DOCKER_REPO }} \
            -o ${{ matrix.UNAME_ARCH }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Publish Docker images
        run: |
          docker push -a ${{ env.DOCKER_REPO }}
